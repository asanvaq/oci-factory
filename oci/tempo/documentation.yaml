version: 2
application: tempo
description: |
  Tempo is a distributed tracing backend by Grafana, supporting Jaeger,
  Zipkin, and OpenTelemetry protocols.
website: https://grafana.com/oss/tempo/
issues: https://github.com/canonical/tempo-rock/issues
source-code: https://github.com/canonical/tempo-rock

docker:
  parameters: >-
    -p 3200:3200
    -p 14268:14268
    -p 9095:9095
    -p 4317:4317
    -p 4318:4318
    -p 9411:9411
  run_conclusion: |
    Tempo starts and exposes its API at http://localhost:3200.
    Ingestion endpoints for each format open separate ports.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-p <port>:3200`':
    type: port
    description: Tempo HTTP API port.
  '`-p <port>:9095`':
    type: port
    description: Tempo GRPC API port.
  '`-p <port>:14268`':
    type: port
    description: Jaeger thrift format ingestion port.
  '`-p <port>:4317`':
    type: port
    description: OpenTelemetry GRPC ingestion port.
  '`-p <port>:4318`':
    type: port
    description: OpenTelemetry HTTP ingestion port.
  '`-p <port>:9411`':
    type: port
    description: Zipkin format ingestion port.
