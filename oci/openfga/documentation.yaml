version: 2

application: openfga
description: |
  A high-performance and flexible authorization/permission engine built for developers
  and inspired by Google Zanzibar. OpenFGA is designed to make it easy for developers
  to model their application permissions and add and integrate fine-grained authorization
  into their applications. It allows in-memory data storage for quick development, as
  well as pluggable database modules.
website: https://openfga.dev/
issues: https://github.com/canonical/openfga-rock/issues
source-code: https://github.com/canonical/openfga-rock

docker:
  run_cmd: --args <named-args>
  parameters: >-
    -p 8080:8080  # http
    -p 8081:8081  # grpc
    -p 3000:3000  # playground
    -p 2112:2112  # prometheus metrics
  run_conclusion: |
    OpenFGA starts and exposes HTTP, gRPC, playground, and metrics endpoints.
    Access HTTP at http://localhost:8080, gRPC at localhost:8081, playground at http://localhost:3000,
    and metrics at http://localhost:2112/metrics when running with port mappings, for example:
    docker run --rm -p 8080:8080 -p 8081:8081 -p 3000:3000 -p 2112:2112 ubuntu/openfga:latest

config:
  OPENFGA_DATASTORE_ENGINE:
    type: env
    description: Datastore type, currently supports postgresql, mysql and sqlite (beta).
  OPENFGA_DATASTORE_URI:
    type: env
    description: Database connection string.
  OPENFGA_PLAYGROUND_ENABLED:
    type: env
    description: Allow playground UI.
  '`-p <port>:8080`':
    type: port
    description: HTTP API port.
  '`-p <port>:8081`':
    type: port
    description: gRPC API port.
  '`-p <port>:3000`':
    type: port
    description: Expose the playground UI.
  '`-p <port>:2112`':
    type: port
    description: Expose Prometheus metrics endpoint.
  '`openfga run`':
    type: app
    description: Launch OpenFGA server(s) using a mix of environment variables.
