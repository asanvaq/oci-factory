version: 2

application: litmuschaos-authserver
website: https://litmuschaos.io/
source-code: https://github.com/canonical/litmuschaos-authserver-rock
issues: https://github.com/canonical/litmuschaos-authserver-rock/issues
description: |
  Litmus authentication server is a component of the LitmusChaos solution, an open
  source platform used for chaos testing.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus)

docker:
  run_cmd: --args <named-args>
  parameters: >-
    -p 3000:3000
  run_conclusion: |
    The authserver is typically deployed as part of the LitmusChaos platform.
    Refer to the [official installation guide](https://docs.litmuschaos.io/docs/getting-started/installation)
    for production deployment instructions.

config:
  '`-e ADMIN_USERNAME=<user>`':
    type: env
    description: Web UI admin username.
  '`-e ADMIN_PASSWORD=<password>`':
    type: env
    description: Web UI admin password.
  '`-e DB_SERVER=<db_address>`':
    type: env
    description: Database server address.
  '`-e DB_USER=<db_user>`':
    type: env
    description: Database username.
  '`-e DB_PASSWORD=<db_password>`':
    type: env
    description: Database password.
  '`-e REST_PORT=3000`':
    type: env
    description: REST API auth server port.
    default: "3000"
  '`-e GRPC_PORT=3030`':
    type: env
    description: gRPC auth server port.
    default: "3030"
  '`-p 3000:3000`':
    type: port
    description: Expose the authentication server on localhost:3000.
