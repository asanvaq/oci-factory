version: 2
application: kafka
description: |
  Apache Kafka is an open-source distributed event streaming platform for
  high-performance data pipelines, streaming analytics and integrations.
  Read more on the [Apache Kafka website](https://kafka.apache.org/).
  
  Please note that the images tagged up to 3.1 are Dockerfile-base images,
  whereas from version 3.6.1 onward the images are now rocks.
website: https://kafka.apache.org
issues: https://github.com/canonical/kafka-rock/issues
source-code: https://github.com/canonical/kafka-rock

docker:
  parameters: >-
    -p 9092:9092
  run_conclusion: |
    Kafka starts and exposes broker port 9092.

config:
  TZ:
    type: env
    description: kafka is configurable with a container timezone value.
    default: 'UTC'
  ZOOKEEPER_HOST:
    type: env
    description: kafka is configurable with the ZooKeeper hostname for Apache Kafka 3.
  ZOOKEEPER_PORT:
    type: env
    description: kafka is configurable with the ZooKeeper port for Apache Kafka 3.
    default: '2181'
  '`-v <path>:/etc/kafka/server.properties`':
    type: mount
    description: kafka is configurable with a mounted Kafka server configuration file.
  '`-v <volume>:/var/lib/kafka`':
    type: mount
    description: kafka is configurable with a mounted volume for persistent broker data.
  '`-p <port>:9092`':
    type: port
    description: kafka is configurable to expose the Apache Kafka broker port on localhost.
  '`--detach`':
    type: other
    description: kafka is runnable in background mode.
  '`--name <container-name>`':
    type: other
    description: kafka is runnable with a custom container name.
