version: 2
application: sloth
description: |
  Sloth is an easy and simple Prometheus SLO (service level objectives) generator.
  It generates understandable, uniform and reliable Prometheus SLOs for any kind of service
  using a simple SLO spec.
website: https://sloth.dev/
issues: https://github.com/canonical/sloth-rock/issues
source-code: https://github.com/canonical/sloth-rock

docker:
  run_cmd: sloth generate -i ./input.yaml -o ./output.yaml
  parameters: >-
    -v ./input.yaml:/input.yaml
    -v ./output.yaml:/output.yaml
  run_conclusion: |
    Sloth generates Prometheus rules from your SLO spec.
    After running with mounted files, the generated rules are written to ./output.yaml.

config:
  '`-v <path>:/input.yaml`':
    type: mount
    description: Bind mount for the SLO spec input.
  '`-v <path>:/output.yaml`':
    type: mount
    description: Bind mount for the generated rules output.
