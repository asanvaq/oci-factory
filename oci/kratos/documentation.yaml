version: 2
application: kratos
description: |
  kratos is the developer-friendly, security-hardened and battle-tested identity,
  User Management and Authentication system for the Cloud.

  The identity management server Ory Kratos enables you to implement user management,
  login and registration in a secure and straightforward way.
  Don't rewrite every aspect of identity management yourself.
  Ory Kratos implements all common flows such as login and logout, account activation,
  mfa/2fa, profile and session management, user facing errors and account recovery methods.
  Just spin up a docker image and write a simple UI for it in the language or framework of
  your choice.
website: https://www.ory.sh/docs/kratos
issues: https://github.com/canonical/kratos-rock
source-code: https://github.com/canonical/kratos-rock
docker:
  parameters: >-
    -p 4433:4433
    -p 4434:4434
    -v /path/to/Kratos/config.yaml:/kratos.yaml
  run_conclusion: |
    Kratos starts both public and admin APIs.
    Access the public API at http://localhost:4433 and the admin API at http://localhost:4434.
    
config:
  TRACING_ENABLED:
    type: env
    description: Tracing enablement.
  TRACING_PROVIDER:
    type: env
    description: Tracing protocol to be used.
  TRACING_PROVIDERS_OTLP_INSECURE:
    type: env
    description: Allow tracing via non TLS insecure communication.
  TRACING_PROVIDERS_OTLP_SAMPLING_SAMPLING_RATIO:
    type: env
    description: Tracing sampling ratio.
  TRACING_PROVIDERS_OTLP_SERVER_URL:
    type: env
    description: Tracing server URL and port.
  SERVE_PUBLIC_BASE_URL:
    type: env
    description: Public URL Kratos will be served from.
  DSN:
    type: env
    description: Database connection string for PostgreSQL database.
  HTTPS_PROXY:
    type: env
    description: HTTPS proxy used in air-gapped environments.
  HTTP_PROXY:
    type: env
    description: HTTP proxy used in air-gapped environments.
  NO_PROXY:
    type: env
    description: Domain that needs to be excluded from the proxy, used in air-gapped environments.
  '`-v <path>:/kratos.yaml`':
    type: mount
    description: Kratos config with settings needed to configure it as an OIDC provider. See https://www.ory.sh/docs/kratos/reference/configuration as a reference.
  '`-p <port>:4433`':
    type: port
    description: Kratos public API port.
  '`-p <port>:4434`':
    type: port
    description: Kratos admin API port.
  '`kratos serve all --config /kratos.yaml`':
    type: app
    description: Launch Kratos web servers using environment variables and the mounted config.
