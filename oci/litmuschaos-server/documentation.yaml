version: 2

application: litmuschaos-server
description: |
  Litmuschaos is a chaos testing platform for kubernetes applications. It allows you to define,
  run and monitor 'chaos experiments' that simulate infrastructure failures to verify the stability
  Read more on the [official documentation](https://litmuschaos.io/).
  
  This rock deploys the backend component, also known as the 'graphql server'.
website: https://litmuschaos.io/
source-code: https://github.com/canonical/litmus-rocks
issues: https://github.com/canonical/litmus-rocks/issues

docker:
  run_cmd: -d --name mongodb \
      -e MONGO_INITDB_ROOT_USERNAME=root \
      -e MONGO_INITDB_ROOT_PASSWORD=password \
      -p 27017:27017 \
      mongo:7 \
      --args <named-args>
  parameters: >-
    -p 3000:3000
  run_conclusion: |
    The server is typically deployed as part of the LitmusChaos platform.
    Refer to the [official installation guide](https://docs.litmuschaos.io/docs/getting-started/installation)
    for production deployment instructions.    

config:
  '`-e VERSION=<version>`':
    type: env
    description: ID of the running version.
  '`-e INFRA_DEPLOYMENTS=["app=chaos-exporter"]`':
    type: env
    description: Deployment names for the infra components.
  '`-e SUBSCRIBER_IMAGE=litmuschaos/litmusportal-subscriber:ci`':
    type: env
    description: Image the chaoscenter uses to deploy the subscriber service.
  '`-e EVENT_TRACKER_IMAGE=litmuschaos/litmusportal-event-tracker:ci`':
    type: env
    description: Image the chaoscenter uses to deploy the event-tracker service.
  '`-e ARGO_WORKFLOW_CONTROLLER_IMAGE=litmuschaos/workflow-controller:v3.3.1`':
    type: env
    description: Image the chaoscenter uses to deploy the argo-workflow-controller service.
  '`-e ARGO_WORKFLOW_EXECUTOR_IMAGE=litmuschaos/argoexec:v3.3.1`':
    type: env
    description: Image the chaoscenter uses to deploy the argo-workflow-executor service.
  '`-e LITMUS_CHAOS_OPERATOR_IMAGE=litmuschaos/chaos-operator:ci`':
    type: env
    description: Image the chaoscenter uses to deploy the chaos-operator service.
  '`-e LITMUS_CHAOS_RUNNER_IMAGE=litmuschaos/chaos-runner:ci`':
    type: env
    description: Image the chaoscenter uses to deploy the chaos-runner service.
  '`-e LITMUS_CHAOS_EXPORTER_IMAGE=litmuschaos/chaos-exporter:ci`':
    type: env
    description: Image the chaoscenter uses to deploy the chaos-exporter service.
  '`-e CONTAINER_RUNTIME_EXECUTOR=k8sapi`':
    type: env
    description: Runtime executor.
  '`-e WORKFLOW_HELPER_IMAGE_VERSION=ci`':
    type: env
    description: Image version tag for the workflow helper.
  '`-e INFRA_COMPATIBLE_VERSIONS=ci`':
    type: env
    description: Image version tag for the infra workloads.
  '`-e DEFAULT_HUB_BRANCH_NAME=master`':
    type: env
    description: Default branch name for GitOps repositories.
  '`-e ADMIN_USERNAME=<user>`':
    type: env
    description: Web UI admin username.
  '`-e ADMIN_PASSWORD=<password>`':
    type: env
    description: Web UI admin password.
  '`-e DB_SERVER=<db_address>`':
    type: env
    description: Database server address.
  '`-e DB_USER=<db_user>`':
    type: env
    description: Database username.
  '`-e DB_PASSWORD=<db_password>`':
    type: env
    description: Database password.
  '`-e REST_PORT=3000`':
    type: env
    description: REST API auth server port.
    default: "3000"
  '`-e GRPC_PORT=3030`':
    type: env
    description: gRPC auth server port.
    default: "3030"
  '`-p 3000:3000`':
    type: port
    description: Expose the backend server on localhost:3000.