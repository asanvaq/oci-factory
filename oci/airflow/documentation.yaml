version: 2
application: airflow
description: |
  Apache Airflow is a platform to programmatically author, schedule,
  and monitor workflows. This rock ("airflow") packages Airflow built
  from source on Ubuntu with Python and a wide set of providers.
website: https://airflow.apache.org
issues: https://github.com/canonical/airflow-rocks/issues
source-code: https://github.com/canonical/airflow-rocks

docker:
  parameters:
    - -p 8080:8080
    - -e AIRFLOW_HOME=/opt/airflow
    - -v /path/to/dags:/opt/airflow/dags
    - -v /path/to/airflow.cfg:/opt/airflow/airflow.cfg
  run_conclusion: |
    airflow starts running `airflow standalone`, which initialises a local
    metadata DB, creates a default admin user, and starts the webserver and scheduler.

config:
  AIRFLOW_HOME:
    type: env
    description: airflow is configurable with a root directory for state inside the container (DB, logs, dags, config).
    default: /opt/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES:
    type: env
    description: airflow is configurable to load or skip the example DAGs that ship with Airflow.
    default: 'false'
  AIRFLOW__CORE__EXECUTOR:
    type: env
    description: airflow is configurable with an executor class (LocalExecutor, CeleryExecutor, KubernetesExecutor, or a custom import path).
    default: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
    type: env
    description: airflow is configurable with a SQLAlchemy connection string for the metadata DB; standalone defaults to SQLite but production deployments typically use Postgres or MySQL.
    default: postgresql+psycopg2://airflow:airflow@db:5432/airflow
  AIRFLOW__CORE__AUTH_MANAGER:
    type: env
    description: airflow is configurable with an authentication manager class; see the Airflow Auth Manager documentation for available managers and their options.
    default: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__API__SECRET_KEY:
    type: env
    description: airflow is configurable with a secret key for the API server; must be the same across all instances to avoid CSRF token errors.
    default: change-me
  AIRFLOW__API__BASE_URL:
    type: env
    description: airflow is configurable with the base URL of the API server.
    default: https://airflow.example.com
  AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG:
    type: env
    description: airflow is configurable with the maximum number of concurrently running task instances per DAG run.
    default: '16'
  '`-v <path>:/opt/airflow/dags`':
    type: mount
    description: airflow is configurable with a host DAGs directory mounted so changes are picked up without rebuilding the image.
  '`-v <path>:/opt/airflow/logs`':
    type: mount
    description: airflow is configurable with a host logs directory to persist task logs across container restarts.
  '`-v <path>:/opt/airflow/airflow.cfg`':
    type: mount
    description: airflow is configurable with a custom airflow.cfg mounted to override the auto-generated configuration.
  '`-v <path>:/requirements.txt`':
    type: mount
    description: airflow is configurable with a requirements file mounted to install extra Python dependencies at runtime.
  '`-p <port>:8080`':
    type: port
    description: airflow is configurable to expose the Airflow webserver UI (HTTP).
  '`-p <port>:8794`':
    type: port
    description: airflow is configurable to expose the triggerer log server port for log streaming.
  '`-p <port>:8793`':
    type: port
    description: airflow is configurable to expose the worker log server port for log streaming in distributed setups.

override_tracks:
  3-24.04:
    end-of-life: "2026-04-02"
