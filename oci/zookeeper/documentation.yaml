version: 2
application: zookeeper
description: |
  ZooKeeper is a centralized service for maintaining configuration information,
  naming, providing distributed synchronization, and providing group services.
  All of these kinds of services are used in some form or another by
  distributed applications. This rock is shipped in support of the Apache Kafka rock.

  Please note that rocks tagged up to 3.1 are Dockerfile-based images,
  whereas from version 3.8.2 onward the rocks are chiseled rocks.
website: https://zookeeper.apache.org/
issues: https://github.com/canonical/zookeeper-rock/issues
source-code: https://github.com/canonical/zookeeper-rock

docker:
  parameters: >-
    -p 2181:2181
  run_conclusion: |
    ZooKeeper starts and serves client traffic on port 2181.
    Access your ZooKeeper server at localhost:2181 after running with a port mapping.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-v <path>:/etc/zookeeper/zoo.cfg`':
    type: mount
    description: Local ZooKeeper configuration file.
  '`-v <volume>:/var/lib/zookeeper/data`':
    type: mount
    description: Persist data in a Docker volume named zookeeperData. Keep the mount point consistent with the configuration property dataDir.
  '`-v <volume>:/var/lib/zookeeper/data-log`':
    type: mount
    description: Persist data in a Docker volume named zookeeperLogData. Keep the mount point consistent with the configuration property dataLogDir.
  '`-p <port>:2181`':
    type: port
    description: Expose port 2181 on the local host.
