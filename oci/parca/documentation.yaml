version: 2
application: parca
description: |
  Parca provides continuous profiling for analysis of CPU and memory usage, down to the line number
  and throughout time. Saving infrastructure cost, improving performance, and increasing reliability.

  Please note that this repository is now holding a rock, not a
  Dockerfile-based image. As such the entrypoint is now Pebble.
website: https://www.parca.dev/
issues: https://github.com/canonical/parca-rock/issues
source-code: https://github.com/canonical/parca-rock

docker:
  parameters: >-
    -e TZ=UTC
  run_conclusion: |
    Parca starts on port 7070.
    Access your Parca instance at http://localhost:7070 after running with a port mapping, for example:
    docker run -e TZ=UTC -p 7070:7070 -v /path/to/parca/config.yaml:/etc/parca/parca.yaml ubuntu/parca:latest

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-v <path>:/etc/parca/parca.yaml`':
    type: mount
    description: Local configuration file for Parca.
  '`-p <port>:7070`':
    type: port
    description: Expose Parca on localhost:7070.
