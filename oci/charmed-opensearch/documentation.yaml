version: 2

application: charmed-opensearch
description: |
  charmed-opensearch is a rock for charmed-opensearch maintained by [Canonical](https://canonical.com).

  OpenSearch is a community-driven, Apache 2.0-licensed open source
  search and analytics suite that makes it easy to ingest, search, visualize, and analyze data.
  Developers build with OpenSearch for use cases such as application search,
  log analytics, data observability, data ingestion, and more.
website: https://opensearch.org/
issues: https://github.com/canonical/charmed-opensearch-rock/issues
source-code: https://github.com/canonical/charmed-opensearch-rock

docker:
  run_cmd: --args <named-args>
  parameters: -d --name opensearch-container
  run_conclusion: |
    The container starts OpenSearch with the rock defaults.
 
