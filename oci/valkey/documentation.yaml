version: 2
application: valkey
description: |
  This is an OCI image that bundles Valkey together with the metrics exporter.
  Valkey is an open source, flexible distributed key-value datastore that is
  optimized for caching and other realtime workloads.
website: https://valkey.io/
issues: https://github.com/canonical/charmed-valkey-rock/issues
source-code: https://github.com/canonical/charmed-valkey-rock

docker:
  run_cmd: --name valkey
  parameters: >-
    -p 6379:6379
  run_conclusion: |
    Valkey starts on port 6379.
    Access your Valkey server at localhost:6379 after running with a port mapping.

config:
  TZ:
    type: env
    description: Timezone.
    default: 'UTC'
  '`-p <port>:6379`':
    type: port
    description: Expose port 6379 on the local host.
