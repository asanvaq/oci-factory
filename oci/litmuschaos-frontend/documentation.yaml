version: 2

application: litmuschaos-frontend
website: https://litmuschaos.io/
source-code: https://github.com/canonical/litmus-rocks
issues: https://github.com/canonical/litmus-rocks/issues
description: |
  Litmus frontend server is a component of the LitmusChaos solution, an open source
  platform used for chaos testing. It provides the web user interface for
  interacting with Litmus ChaosCenter services.
  Read more in the [official documentation](https://github.com/litmuschaos/litmus).

docker:
  run_cmd: --args <named-args>
  parameters: >-
    -p 8185:8185
  run_conclusion: |
    The frontend is typically deployed as part of the LitmusChaos platform.
    Refer to the [official installation guide](https://docs.litmuschaos.io/docs/getting-started/installation)
    for production deployment instructions.

config:
  '`-p 8185:8185`':
    type: port
    description: Expose the frontend on localhost:8185.
