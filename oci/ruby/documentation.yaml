version: 2

application: ruby
description: |
  Ruby is a rock for ruby maintained by [Canonical](https://canonical.com).

  Ruby is a general-purpose programming language. It is interpreted, high-level,
  and dynamically typed. It supports multiple programming paradigms, including
  procedural, object-oriented, and functional programming.
website: https://www.ruby-lang.org/
issues: https://github.com/canonical/ruby-rock/issues
source-code: https://github.com/canonical/ruby-rock

docker:
  run_cmd: --args <named-args>
  parameters: -d --name ruby-container
  run_conclusion: |
    The container starts in detached mode.

override_tracks:
  # Tracks with different tag than build-base
  3.3-25.04:
    end-of-life: '2026-01-15T00:00:00Z'
